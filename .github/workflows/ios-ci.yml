name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build iOS shared framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --console=plain
